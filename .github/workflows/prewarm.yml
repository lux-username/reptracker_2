name: Pre-warm cache (hourly)

# Sub-daily refresh of the Upstash caches (Issue #23). Vercel Hobby crons are
# daily-only, so this external scheduler hits the same /api/cron/prewarm route
# hourly to collapse worst-case staleness from ~24h toward ~1h — bounded by
# Congress.gov's own publish latency, not our cadence. The route self-paces
# under the Congress.gov key quota via the client-side limiter (Issue #17) and
# authenticates with the shared CRON_SECRET (also set in Vercel Production).
#
# Cadence is hourly to start (see decisions.md 2026-07-09); tune once upstream
# publish latency is measured.

on:
  schedule:
    # Every 30 min at :15 and :45 (UTC). Cadence set from measurement (2026-07-09):
    # Congress.gov reflects a House committee meeting ~4-15 min after the House
    # posts it on docs.house.gov, so the upstream floor is ~15 min and our poll
    # gap is the binding constraint; 30 min ⇒ ~30-min worst-case staleness for the
    # short-notice decisions the product exists for. The :15/:45 offset keeps both
    # runs well clear of the Vercel daily cron (08:00 UTC in vercel.json) so the
    # two schedulers never collide on one instance and throttle each other (#17).
    - cron: "15,45 * * * *"
  workflow_dispatch: {} # allow manual runs from the Actions tab / `gh workflow run`

# Never stack runs if one is slow; let the in-flight one finish.
concurrency:
  group: prewarm
  cancel-in-progress: false

# The job only calls an external URL — it needs no repository permissions.
permissions: {}

jobs:
  prewarm:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger pre-warm cron
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "${CRON_SECRET}" ]; then
            echo "::error::CRON_SECRET secret is not set on this repository"
            exit 1
          fi
          code=$(curl -sS -X GET \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -o response.json -w '%{http_code}' \
            --max-time 120 \
            https://reptracker2.vercel.app/api/cron/prewarm)
          echo "HTTP ${code}"
          case "${code}" in
            200)
              # Non-sensitive run stats (no secrets in the response).
              python3 -c "import json;d=json.load(open('response.json'));print('ok=%s elapsedMs=%s floorBills=%s districtMembers=%s eventsIdx=%s'%(d.get('ok'),d.get('elapsedMs'),(d.get('floor') or {}).get('houseBills'),(d.get('districtOffices') or {}).get('members'),(d.get('events') or {}).get('indexSize')))"
              ;;
            502|503|504)
              # Transient: the incremental warm brushed the 60s function ceiling
              # (Congress.gov latency / a rare scheduler collision). It resumes on
              # the next run — warn, don't fail the scheduler over it.
              echo "::warning::prewarm returned HTTP ${code} (transient timeout); warming resumes next run"
              ;;
            *)
              echo "::error::prewarm returned HTTP ${code}"
              cat response.json 2>/dev/null || true
              exit 1
              ;;
          esac

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="5" fill="#0f172a"/>
  <g fill="#f8fafc">
    <!-- finial -->
    <rect x="14.8" y="3.6" width="2.4" height="2.4" rx="0.6"/>
